name: Build and Run btranslate (Pin 4.0)

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Download Pin 4.0
      run: |
        wget -q https://software.intel.com/sites/landingpage/pintool/downloads/pin-external-4.0-99633-g5ca9893f2-gcc-linux.tar.gz -O pin.tar.gz
        tar -xzf pin.tar.gz
        mv pin-external-4.0-* pin

    - name: Build btranslate.so with Pin 4.0
      run: |
        PIN_ROOT=$(pwd)/pin
        PINCC=${PIN_ROOT}/intel64/pinrt/bin/pin-g++
        mkdir -p obj-intel64
        ${PINCC} \
          -std=c++17 \
          -Wall -Wno-unknown-pragmas \
          -fno-stack-protector -fno-exceptions \
          -funwind-tables -fasynchronous-unwind-tables \
          -fno-rtti -fPIC -faligned-new \
          -O3 -fomit-frame-pointer -fno-strict-aliasing \
          -I${PIN_ROOT}/source/include/pin \
          -I${PIN_ROOT}/source/include/pin/gen \
          -I${PIN_ROOT}/extras/components/include \
          -I${PIN_ROOT}/extras/xed-intel64/include/xed \
          -I${PIN_ROOT}/source/tools/InstLib \
          -isystem ${PIN_ROOT}/intel64/pinrt/include/adaptor \
          -shared -Wl,-Bsymbolic \
          -Wl,--version-script=${PIN_ROOT}/source/include/pin/pintool.ver \
          -o obj-intel64/btranslate.so btranslate.cpp \
          -L${PIN_ROOT}/intel64/lib \
          -L${PIN_ROOT}/intel64/pinrt/lib \
          -L${PIN_ROOT}/extras/xed-intel64/lib \
          -lpin -lpinrt-adaptor-static -lxed -lpindwarf -ldwarf -lunwind-dynamic

    - name: Make binary executable
      run: chmod +x cpugcc_r_base.Oz-m64

    - name: Binary search for faulty routine
      run: |
        PIN_ROOT=$(pwd)/pin
        PINTOOL=obj-intel64/btranslate.so

        run_pin() {
          local limit=$1
          rm -f 200.s
          if [ "$limit" = "all" ]; then
            "${PIN_ROOT}/pin" -t "$PINTOOL" -- \
              ./cpugcc_r_base.Oz-m64 200.i -o 200.s 2>&1
          else
            "${PIN_ROOT}/pin" -t "$PINTOOL" -limit_rtn "$limit" -- \
              ./cpugcc_r_base.Oz-m64 200.i -o 200.s 2>&1
          fi
        }

        echo "=== Step 1: verify limit=0 (no translation) succeeds ==="
        run_pin 0
        if [ -f 200.s ]; then
          echo "limit=0: OK"
          rm -f 200.s
        else
          echo "FATAL: even limit=0 fails"
          exit 1
        fi

        echo "=== Step 2: try full translation ==="
        run_pin all
        if [ -f 200.s ]; then
          echo "Full run SUCCESS â€” 200.s generated!"
          wc -l 200.s
          exit 0
        fi
        echo "Full run crashes â€” starting binary search"
        rm -f 200.s

        echo "=== Step 3: binary search ==="
        lo=0
        hi=200000
        while [ $((hi - lo)) -gt 1 ]; do
          mid=$(( (lo + hi) / 2 ))
          echo "--- limit=$mid (lo=$lo hi=$hi) ---"
          output=$(run_pin $mid 2>&1)
          if [ -f 200.s ]; then
            echo "limit=$mid: OK"
            lo=$mid
            rm -f 200.s
          else
            echo "limit=$mid: CRASH"
            hi=$mid
          fi
        done

        echo "=== Faulty routine is #$hi ==="
        echo "=== Running limit=$hi to get routine name ==="
        run_pin $hi 2>&1 | grep "BSEARCH"

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: btranslate-results
        path: |
          obj-intel64/btranslate.so
          200.s
